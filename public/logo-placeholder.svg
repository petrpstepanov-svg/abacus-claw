<svg xmlns="https://cdn.creativefabrica.com/2021/08/07/Towing-Hook-Icon-Graphics-15594372-1-1-580x374.jpg" viewBox="0 0 200 48" fill="none">
  <!-- Иконка: стилизованный эвакуатор / крюк -->
  <g transform="translate(4, 4)">
    <!-- Кузов -->
    <rect x="0" y="16" width="28" height="16" rx="3" fill="#E11D48"/>
    <!-- Кабина -->
    <path d="M28 20 L38 20 L38 32 L28 32 Z" fill="#0F172A"/>
    <!-- Стрела крана -->
    <path d="M8 16 L4 2 L10 2 L14 16" fill="#E11D48" opacity="0.85"/>
    <!-- Крюк -->
    <path d="M7 2 L7 -2 Q7 -5 10 -5 Q13 -5 13 -2 L13 0" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Колёса -->
    <circle cx="8" cy="35" r="5" fill="#0F172A"/>
    <circle cx="8" cy="35" r="2.5" fill="#F8FAFC"/>
    <circle cx="32" cy="35" r="5" fill="#0F172A"/>
    <circle cx="32" cy="35" r="2.5" fill="#F8FAFC"/>
  </g>
  <!-- Текст "AutoHub" -->
  <text x="52" y="22" font-family="sans-serif" font-weight="700" font-size="18" fill="#0F172A">
    Auto<tspan fill="#E11D48">Hub</tspan>
  </text>
  <!-- Подпись "Ростов" -->
  <text x="52" y="38" font-family="sans-serif" font-weight="400" font-size="11" fill="#38BDF8" letter-spacing="1.5">
    РОСТОВ
  </text>
</svg>
